<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素风机甲对战</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            border: 4px solid #3a3a5a;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(79, 195, 247, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 600px;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
        }

        .menu-overlay.hidden {
            display: none;
        }

        .menu-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 60px;
            text-shadow: 4px 4px 0 #3a3a5a, 0 0 20px rgba(79, 195, 247, 0.5);
            letter-spacing: 4px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .menu-btn {
            width: 280px;
            padding: 18px 40px;
            margin: 12px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(180deg, #4a4a6a 0%, #2a2a4a 100%);
            border: 3px solid #6a6a8a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-btn:hover {
            background: linear-gradient(180deg, #5a5a7a 0%, #3a3a5a 100%);
            border-color: #8a8aaa;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
        }

        .menu-btn:active {
            transform: translateY(0);
        }

        .menu-btn.blue {
            border-color: #2d6bb3;
            background: linear-gradient(180deg, #1a4f8a 0%, #0d2d4d 100%);
        }

        .menu-btn.red {
            border-color: #c94444;
            background: linear-gradient(180deg, #8a2d2d 0%, #4d1515 100%);
        }

        .input-group {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            font-size: 14px;
            margin-bottom: 8px;
            color: #8a8aaa;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 260px;
            padding: 12px 16px;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            color: #fff;
            background: #1a1a2e;
            border: 2px solid #4a4a6a;
            border-radius: 4px;
            text-align: center;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
        }

        .room-info {
            margin: 20px 0;
            padding: 15px 25px;
            background: rgba(79, 195, 247, 0.1);
            border: 2px solid #4fc3f7;
            border-radius: 4px;
            text-align: center;
        }

        .room-info .label {
            font-size: 12px;
            color: #8a8aaa;
            margin-bottom: 8px;
        }

        .room-info .room-id {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
            letter-spacing: 3px;
            word-break: break-all;
        }

        .status-text {
            margin: 15px 0;
            font-size: 16px;
            color: #f5d742;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #5a5a7a;
            text-align: center;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            color: #8a8aaa;
            background: transparent;
            border: 2px solid #4a4a6a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .back-btn:hover {
            border-color: #8a8aaa;
            color: #fff;
        }

        #healthBars {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .health-container {
            width: 320px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            border: 2px solid #3a3a5a;
        }

        .health-container.blue {
            border-color: #2d6bb3;
        }

        .health-container.red {
            border-color: #c94444;
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .player-name.blue { color: #5c9bd4; }
        .player-name.red { color: #e57373; }

        .health-bar-bg {
            width: 100%;
            height: 20px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        .health-bar {
            height: 100%;
            transition: width 0.2s ease;
            border-radius: 2px;
        }

        .health-bar.blue {
            background: linear-gradient(180deg, #4fc3f7 0%, #1a4f8a 50%, #0d2d4d 100%);
        }

        .health-bar.red {
            background: linear-gradient(180deg, #ff8a80 0%, #c94444 50%, #8a2d2d 100%);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 600px;
            background: rgba(15, 15, 26, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            border-radius: 8px;
        }

        .game-over-overlay.hidden {
            display: none;
        }

        .game-over-text {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 4px 4px 0 #3a3a5a, 0 0 30px currentColor;
            animation: gameOverPulse 1s ease-in-out infinite;
        }

        .game-over-text.blue { color: #4fc3f7; }
        .game-over-text.red { color: #ff6b6b; }

        @keyframes gameOverPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="healthBars" class="hidden">
            <div class="health-container blue">
                <div class="player-name blue">PLAYER 1</div>
                <div class="health-bar-bg">
                    <div id="health1" class="health-bar blue" style="width: 100%"></div>
                </div>
            </div>
            <div class="health-container red">
                <div class="player-name red">PLAYER 2</div>
                <div class="health-bar-bg">
                    <div id="health2" class="health-bar red" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div id="mainMenu" class="menu-overlay">
            <div class="menu-title">⚔ 机甲对决 ⚔</div>
            <button class="menu-btn blue" onclick="startLocalGame()">本地对战</button>
            <button class="menu-btn red" onclick="showNetworkMenu()">网络对战</button>
        </div>

        <div id="networkMenu" class="menu-overlay hidden">
            <button class="back-btn" onclick="showMainMenu()">← 返回</button>
            <div class="menu-title" style="font-size: 36px;">网络对战</div>
            <button class="menu-btn" onclick="createRoom()">创建房间</button>
            <div class="input-group">
                <label>或输入房间ID加入</label>
                <input type="text" id="roomInput" placeholder="输入房间ID">
            </div>
            <button class="menu-btn" onclick="joinRoom()">加入房间</button>
        </div>

        <div id="waitingRoom" class="menu-overlay hidden">
            <button class="back-btn" onclick="leaveRoom()">← 返回</button>
            <div class="menu-title" style="font-size: 32px;">等待连接...</div>
            <div class="room-info">
                <div class="label">房间 ID（发送给对方）</div>
                <div id="roomIdDisplay" class="room-id">---</div>
            </div>
            <div class="status-text">等待玩家加入...</div>
        </div>

        <div id="connectingScreen" class="menu-overlay hidden">
            <button class="back-btn" onclick="cancelJoin()">← 返回</button>
            <div class="menu-title" style="font-size: 32px;">连接中...</div>
            <div class="status-text">正在连接到房间...</div>
        </div>

        <div id="gameOverScreen" class="game-over-overlay hidden">
            <div id="winnerText" class="game-over-text">玩家1 胜利!</div>
            <div class="btn-group">
                <button class="menu-btn blue" onclick="restartGame()">再来一局</button>
                <button class="menu-btn" onclick="returnToMenu()">返回菜单</button>
            </div>
        </div>

        <div class="controls-hint">
            P1: W跳跃 A/D移动 J攻击 K防御 | P2: ↑跳跃 ←/→移动 .攻击 /防御
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GRAVITY = 0.8;
        const MOVE_SPEED = 5;
        const JUMP_SPEED = -15;
        const GROUND_Y = 450;
        const PLATFORM_WIDTH = 700;
        const PLATFORM_X = (800 - PLATFORM_WIDTH) / 2;
        const ATTACK_DAMAGE = 15;
        const DEFEND_REDUCTION = 0.5;
        const ATTACK_COOLDOWN = 500;
        const ATTACK_RANGE = 80;
        const MECH_WIDTH = 64;
        const MECH_HEIGHT = 64;
        const SCALE = 3;

        let gameState = 'menu';
        let isNetworkGame = false;
        let isHost = false;
        let peer = null;
        let conn = null;
        let localPlayerId = 0;
        let remotePlayerId = 1;

        const keys = {};

        class Mech {
            constructor(x, y, isPlayer1) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.hp = 100;
                this.maxHp = 100;
                this.direction = isPlayer1 ? 1 : -1;
                this.state = 'idle';
                this.animationFrame = 0;
                this.animationTimer = 0;
                this.isPlayer1 = isPlayer1;
                this.lastAttackTime = 0;
                this.isAttacking = false;
                this.attackHit = false;
                this.isDefending = false;
                this.hitTimer = 0;
                this.invincible = false;
                this.stateTimer = 0;

                this.colors = isPlayer1 ? {
                    primary: '#1a4f8a',
                    secondary: '#5c7c99',
                    highlight: '#f5d742',
                    armor: '#2d6bb3'
                } : {
                    primary: '#8a2d2d',
                    secondary: '#4a4a4a',
                    highlight: '#4fc3f7',
                    armor: '#c94444'
                };
            }

            update(dt, opponent) {
                this.animationTimer += dt;
                if (this.animationTimer > 100) {
                    this.animationTimer = 0;
                    this.animationFrame = (this.animationFrame + 1) % 4;
                }

                if (this.hitTimer > 0) {
                    this.hitTimer -= dt;
                    if (this.hitTimer <= 0) {
                        this.invincible = false;
                    }
                }

                if (this.state === 'hit') {
                    this.stateTimer -= dt;
                    if (this.stateTimer <= 0) {
                        this.state = 'idle';
                    }
                    return;
                }

                if (this.isAttacking) {
                    this.stateTimer -= dt;
                    if (this.stateTimer <= 0) {
                        this.isAttacking = false;
                        this.attackHit = false;
                        this.state = 'idle';
                    }
                }

                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < PLATFORM_X + 30) {
                    this.x = PLATFORM_X + 30;
                }
                if (this.x > PLATFORM_X + PLATFORM_WIDTH - 30) {
                    this.x = PLATFORM_X + PLATFORM_WIDTH - 30;
                }

                if (this.y >= GROUND_Y) {
                    this.y = GROUND_Y;
                    this.vy = 0;
                    if (this.state === 'jump' || this.state === 'fall') {
                        this.state = 'idle';
                    }
                }

                if (this.state !== 'attack' && this.state !== 'hit') {
                    if (this.vx !== 0) {
                        this.state = 'walk';
                    } else if (this.y < GROUND_Y) {
                        this.state = this.vy < 0 ? 'jump' : 'fall';
                    } else {
                        this.state = 'idle';
                    }
                }

                this.vx = 0;
            }

            jump() {
                if (this.y >= GROUND_Y - 1 && this.state !== 'hit') {
                    this.vy = JUMP_SPEED;
                    this.state = 'jump';
                }
            }

            moveLeft() {
                if (this.state !== 'hit') {
                    this.vx = -MOVE_SPEED;
                    this.direction = -1;
                }
            }

            moveRight() {
                if (this.state !== 'hit') {
                    this.vx = MOVE_SPEED;
                    this.direction = 1;
                }
            }

            attack(opponent) {
                const now = Date.now();
                if (now - this.lastAttackTime < ATTACK_COOLDOWN) return;
                if (this.state === 'hit') return;

                this.lastAttackTime = now;
                this.isAttacking = true;
                this.attackHit = false;
                this.state = 'attack';
                this.stateTimer = 300;

                const dist = Math.abs(this.x - opponent.x);
                if (dist < ATTACK_RANGE) {
                    opponent.takeDamage(this.isDefending ? ATTACK_DAMAGE * DEFEND_REDUCTION : ATTACK_DAMAGE);
                    this.attackHit = true;
                }
            }

            defend(isDefending) {
                this.isDefending = isDefending;
                if (isDefending && this.state !== 'hit' && this.state !== 'attack') {
                    this.state = 'defend';
                } else if (!isDefending && this.state === 'defend') {
                    this.state = 'idle';
                }
            }

            takeDamage(amount) {
                if (this.invincible) return;

                this.hp = Math.max(0, this.hp - amount);
                this.state = 'hit';
                this.stateTimer = 200;
                this.hitTimer = 500;
                this.invincible = true;
                this.vx = -this.direction * 3;

                if (this.hp <= 0) {
                    gameState = 'gameover';
                    showGameOver(!this.isPlayer1);
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                const bobOffset = this.state === 'idle' ? Math.sin(Date.now() / 200) * 2 : 0;
                ctx.translate(0, bobOffset);

                if (this.hitTimer > 0 && Math.floor(this.hitTimer / 50) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                const facing = this.direction;
                ctx.scale(facing, 1);

                const c = this.colors;
                const legOffset = this.state === 'walk' ? Math.sin(this.animationFrame * Math.PI / 2) * 4 : 0;
                const armOffset = this.state === 'attack' ? 20 : (this.state === 'defend' ? -10 : 0);
                const bodyTilt = this.state === 'defend' ? -0.1 : 0;

                ctx.rotate(bodyTilt);

                this.drawLeg(15, 40, legOffset, c);
                this.drawLeg(-15, 40, -legOffset, c);

                this.drawBody(0, 10, c);

                this.drawArm(-20, 0, armOffset, c);
                this.drawArm(20, 0, this.state === 'attack' ? -15 : 0, c);

                this.drawHead(0, -30, c);

                if (this.state === 'defend') {
                    this.drawShield(25, -10, c);
                }

                if (this.state === 'attack') {
                    this.drawFist(40 + armOffset, 5, c);
                }

                ctx.restore();
            }

            drawLeg(x, y, offset, c) {
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 8, y + offset, 16, 24);
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 6, y + 4 + offset, 12, 16);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 7, y + offset, 14, 8);
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 9, y + 18 + offset, 18, 8);
            }

            drawBody(x, y, c) {
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 20, y, 40, 35);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 18, y + 2, 36, 12);
                ctx.fillRect(x - 16, y + 16, 32, 8);
                ctx.fillStyle = c.highlight;
                ctx.fillRect(x - 14, y + 5, 8, 4);
                ctx.fillStyle = '#ff4444';
                if (this.hp < this.maxHp * 0.3) {
                    if (Math.floor(Date.now() / 200) % 2 === 0) {
                        ctx.fillRect(x - 5, y + 20, 10, 6);
                    }
                }
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 4, y + 22, 8, 4);
            }

            drawArm(x, y, offset, c) {
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 6, y + offset, 12, 30);
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 4, y + 2 + offset, 8, 20);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 5, y + offset, 10, 8);
            }

            drawHead(x, y, c) {
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 16, y, 32, 24);
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 14, y + 2, 28, 18);
                ctx.fillStyle = c.highlight;
                ctx.fillRect(x - 12, y + 4, 10, 6);
                ctx.fillRect(x + 2, y + 4, 10, 6);
                ctx.fillStyle = '#fff';
                ctx.fillRect(x - 10, y + 6, 6, 3);
                ctx.fillRect(x + 4, y + 6, 6, 3);
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 4, y + 14, 8, 6);
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 2, y + 16, 4, 4);
            }

            drawFist(x, y, c) {
                ctx.fillStyle = c.highlight;
                ctx.fillRect(x - 8, y - 8, 16, 16);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 6, y - 6, 12, 12);
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 4, y - 4, 8, 8);
            }

            drawShield(x, y, c) {
                ctx.fillStyle = 'rgba(79, 195, 247, 0.4)';
                ctx.beginPath();
                ctx.ellipse(x, y, 15, 25, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#4fc3f7';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = 'rgba(79, 195, 247, 0.6)';
                ctx.beginPath();
                ctx.ellipse(x, y, 10, 18, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            getState() {
                return {
                    x: this.x,
                    y: this.y,
                    vx: this.vx,
                    vy: this.vy,
                    hp: this.hp,
                    direction: this.direction,
                    state: this.state,
                    isDefending: this.isDefending
                };
            }

            setState(state) {
                if (state.x !== undefined) this.x = state.x;
                if (state.y !== undefined) this.y = state.y;
                if (state.vx !== undefined) this.vx = state.vx;
                if (state.vy !== undefined) this.vy = state.vy;
                if (state.hp !== undefined) this.hp = state.hp;
                if (state.direction !== undefined) this.direction = state.direction;
                if (state.isDefending !== undefined) this.isDefending = state.isDefending;
            }
        }

        let player1, player2;
        let lastTime = 0;

        function initGame() {
            player1 = new Mech(200, GROUND_Y, true);
            player2 = new Mech(600, GROUND_Y, false);
            updateHealthBars();
        }

        function updateHealthBars() {
            document.getElementById('health1').style.width = (player1.hp / player1.maxHp * 100) + '%';
            document.getElementById('health2').style.width = (player2.hp / player2.maxHp * 100) + '%';
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 800, 600);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 600);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % 800;
                const y = (i * 47) % 400;
                ctx.fillRect(x, y, 2, 2);
            }

            ctx.fillStyle = '#2a2a4a';
            ctx.fillRect(PLATFORM_X, GROUND_Y + 64, PLATFORM_WIDTH, 86);

            const platformGradient = ctx.createLinearGradient(0, GROUND_Y, 0, GROUND_Y + 64);
            platformGradient.addColorStop(0, '#6a6a6a');
            platformGradient.addColorStop(0.3, '#5a5a5a');
            platformGradient.addColorStop(1, '#3a3a3a');
            ctx.fillStyle = platformGradient;
            ctx.fillRect(PLATFORM_X, GROUND_Y, PLATFORM_WIDTH, 64);

            ctx.fillStyle = '#7a7a7a';
            for (let i = 0; i < PLATFORM_WIDTH; i += 40) {
                ctx.fillRect(PLATFORM_X + i, GROUND_Y, 20, 4);
            }

            ctx.fillStyle = '#f5d742';
            for (let i = 0; i < PLATFORM_WIDTH; i += 80) {
                ctx.fillRect(PLATFORM_X + i, GROUND_Y, 20, 4);
            }
            ctx.fillStyle = '#333';
            for (let i = 40; i < PLATFORM_WIDTH; i += 80) {
                ctx.fillRect(PLATFORM_X + i, GROUND_Y, 20, 4);
            }

            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(PLATFORM_X, GROUND_Y + 60, PLATFORM_WIDTH, 8);
        }

        function handleLocalInput() {
            if (isNetworkGame && localPlayerId === 1) return;

            if (keys['KeyA'] || keys['a']) player1.moveLeft();
            if (keys['KeyD'] || keys['d']) player1.moveRight();
            if (keys['KeyW'] || keys['w']) player1.jump();
            if (keys['KeyJ'] || keys['j']) player1.attack(player2);
            player1.defend(keys['KeyK'] || keys['k']);
        }

        function handleNetworkInput() {
            if (!isNetworkGame) return;

            if (localPlayerId === 1) {
                if (keys['KeyA'] || keys['a']) player1.moveLeft();
                if (keys['KeyD'] || keys['d']) player1.moveRight();
                if (keys['KeyW'] || keys['w']) player1.jump();
                if (keys['KeyJ'] || keys['j']) player1.attack(player2);
                player1.defend(keys['KeyK'] || keys['k']);
            } else {
                if (keys['ArrowLeft']) player2.moveLeft();
                if (keys['ArrowRight']) player2.moveRight();
                if (keys['ArrowUp']) player2.jump();
                if (keys['Period']) player2.attack(player1);
                player2.defend(keys['Slash']);
            }
        }

        function syncGameState() {
            if (!isNetworkGame || !conn || conn.open !== true) return;

            if (localPlayerId === 1) {
                conn.send({
                    type: 'state',
                    player1: player1.getState(),
                    player2: player2.getState()
                });
            } else {
                conn.send({
                    type: 'state',
                    player1: player1.getState(),
                    player2: player2.getState()
                });
            }
        }

        function gameLoop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            if (gameState === 'playing') {
                if (isNetworkGame) {
                    handleNetworkInput();
                } else {
                    handleLocalInput();
                }

                player1.update(dt, player2);
                player2.update(dt, player1);

                if (!isNetworkGame) {
                    if (player1.isAttacking && player1.attackHit) {
                        updateHealthBars();
                    }
                    if (player2.isAttacking && player2.attackHit) {
                        updateHealthBars();
                    }
                } else {
                    updateHealthBars();
                    syncGameState();
                }
            }

            drawBackground();

            if (player1 && player2) {
                player1.draw();
                player2.draw();
            }

            requestAnimationFrame(gameLoop);
        }

        function startLocalGame() {
            isNetworkGame = false;
            initGame();
            gameState = 'playing';
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('healthBars').classList.remove('hidden');
        }

        function showMainMenu() {
            gameState = 'menu';
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('networkMenu').classList.add('hidden');
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('connectingScreen').classList.add('hidden');
            document.getElementById('healthBars').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            if (peer) {
                peer.destroy();
                peer = null;
            }
            conn = null;
        }

        function showNetworkMenu() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('networkMenu').classList.remove('hidden');
        }

        function createRoom() {
            isHost = true;
            localPlayerId = 1;
            remotePlayerId = 2;

            document.getElementById('networkMenu').classList.add('hidden');
            document.getElementById('waitingRoom').classList.remove('hidden');

            peer = new Peer();

            peer.on('open', (id) => {
                document.getElementById('roomIdDisplay').textContent = id;
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
            });

            peer.on('error', (err) => {
                alert('连接错误: ' + err.message);
                showNetworkMenu();
            });
        }

        function joinRoom() {
            const roomId = document.getElementById('roomInput').value.trim();
            if (!roomId) {
                alert('请输入房间ID');
                return;
            }

            isHost = false;
            localPlayerId = 2;
            remotePlayerId = 1;

            document.getElementById('networkMenu').classList.add('hidden');
            document.getElementById('connectingScreen').classList.remove('hidden');

            peer = new Peer();

            peer.on('open', () => {
                conn = peer.connect(roomId, { reliable: true });
                setupConnection();

                conn.on('open', () => {
                    startNetworkGame();
                });
            });

            peer.on('error', (err) => {
                alert('连接错误: ' + err.message);
                showNetworkMenu();
            });
        }

        function setupConnection() {
            conn.on('data', (data) => {
                if (data.type === 'state') {
                    if (localPlayerId === 1) {
                        player2.setState(data.player2);
                    } else {
                        player1.setState(data.player1);
                    }
                }
            });

            conn.on('close', () => {
                alert('连接已断开');
                showMainMenu();
            });
        }

        function startNetworkGame() {
            initGame();

            if (localPlayerId === 2) {
                const temp = player1;
                player1 = player2;
                player2 = temp;
            }

            gameState = 'playing';
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('connectingScreen').classList.add('hidden');
            document.getElementById('healthBars').classList.remove('hidden');
        }

        function leaveRoom() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            conn = null;
            showNetworkMenu();
        }

        function cancelJoin() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            conn = null;
            showNetworkMenu();
        }

        function showGameOver(player1Won) {
            const winnerText = document.getElementById('winnerText');
            if (player1Won) {
                winnerText.textContent = '玩家1 胜利!';
                winnerText.className = 'game-over-text blue';
            } else {
                winnerText.textContent = '玩家2 胜利!';
                winnerText.className = 'game-over-text red';
            }
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            initGame();
            gameState = 'playing';

            if (isNetworkGame && conn && conn.open) {
                if (localPlayerId === 1) {
                    conn.send({ type: 'restart' });
                } else {
                    conn.send({ type: 'restart' });
                }
            }
        }

        function returnToMenu() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            showMainMenu();

            if (isNetworkGame) {
                if (conn) conn.close();
                if (peer) peer.destroy();
                peer = null;
                conn = null;
            }
        }

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            keys[e.key] = true;

            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            keys[e.key] = false;
        });

        initGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
