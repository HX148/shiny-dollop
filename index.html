<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 3D 球体</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // 创建场景
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // 创建相机
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 6, 12);
        camera.lookAt(0, 0, 0);

        // 创建渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 创建球体
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x00ff88,
            roughness: 0.3,
            metalness: 0.7,
            emissive: 0x003322,
            emissiveIntensity: 0.5
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // 增强光照
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const pointLight2 = new THREE.PointLight(0x00ffff, 1);
        pointLight2.position.set(-5, -5, -5);
        scene.add(pointLight2);

        const pointLight3 = new THREE.PointLight(0xff00ff, 0.8);
        pointLight3.position.set(0, 5, 0);
        scene.add(pointLight3);

        const pointLight4 = new THREE.PointLight(0xffff00, 0.6);
        pointLight4.position.set(0, -5, 0);
        scene.add(pointLight4);

        // 添加聚光灯
        const spotLight = new THREE.SpotLight(0x00ff88, 2);
        spotLight.position.set(0, 10, 0);
        spotLight.angle = Math.PI / 6;
        spotLight.penumbra = 0.5;
        spotLight.target = sphere;
        scene.add(spotLight);

        // 跟随球体的点光源
        const sphereLight = new THREE.PointLight(0x00ff88, 1, 10);
        sphere.add(sphereLight);

        // 添加辅助网格
        const gridHelper = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
        gridHelper.position.y = -1.5;
        scene.add(gridHelper);

        // 轨道管理
        const trackMaterial = new THREE.MeshBasicMaterial({ color: 0x4488ff });
        const trackSegmentLength = 20; // 每个轨道段的长度
        const trackSegments = []; // 存储当前轨道段
        let lastGeneratedTrackZ = 0; // 最后生成的轨道段的Z位置

        // 创建单个轨道段（多个并排）
        function createTrackSegment(zCenter) {
            const trackWidth = 6; // 轨道总宽度
            const trackPieceWidth = 0.5; // 每片轨道的宽度
            const gap = 0.2; // 轨道片之间的间隙
            
            for (let x = -trackWidth/2; x <= trackWidth/2; x += trackPieceWidth + gap) {
                const trackGeometry = new THREE.BoxGeometry(trackPieceWidth, 0.1, trackSegmentLength);
                const track = new THREE.Mesh(trackGeometry, trackMaterial);
                track.position.set(x, 0, zCenter);
                scene.add(track);
                trackSegments.push(track);
            }
        }

        // 初始化轨道 - 创建初始轨道段
        for (let i = 0; i < 10; i++) {
            createTrackSegment(-i * trackSegmentLength);
            lastGeneratedTrackZ = -i * trackSegmentLength;
        }

        // 弹跳物理参数 - 球体半径1，轨道顶部y=0.05，所以球体最低点y=0.05时球体位置y=1.05
        const groundLevel = 1.05;

        let velocity = 0;
        const gravity = -0.015;
        const targetHeight = 3;
        let zVelocity = -0.03;
        
        // 计算达到目标高度所需的速度
        const heightDiff = targetHeight - groundLevel;
        const requiredVelocity = Math.sqrt(2 * Math.abs(gravity) * heightDiff);
        velocity = requiredVelocity;

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 球体旋转
            sphere.rotation.x += 0.005;
            sphere.rotation.y += 0.01;
            
            // 弹跳物理 - 保持恒定高度
            velocity += gravity;
            sphere.position.y += velocity;
            
            if (sphere.position.y <= groundLevel) {
                sphere.position.y = groundLevel;
                velocity = requiredVelocity;
            }

            // 轨道向后移动（向Z正方向）
            for (const track of trackSegments) {
                track.position.z -= zVelocity;
            }

            // 动态轨道管理
            manageTrackSegments();
            
            renderer.render(scene, camera);
        }

        // 动态加载和回收轨道段
        function manageTrackSegments() {
            // 检查是否需要生成新的轨道段（在前面）
            while (lastGeneratedTrackZ > -3 * trackSegmentLength) {
                lastGeneratedTrackZ -= trackSegmentLength;
                createTrackSegment(lastGeneratedTrackZ);
            }

            // 更新最后生成的位置
            if (trackSegments.length > 0) {
                let minZ = Infinity;
                for (const track of trackSegments) {
                    if (track.position.z < minZ) {
                        minZ = track.position.z;
                    }
                }
                lastGeneratedTrackZ = minZ;
            }

            // 回收远离的轨道段（后面的轨道）
            const maxDistance = 8 * trackSegmentLength;
            for (let i = trackSegments.length - 1; i >= 0; i--) {
                const track = trackSegments[i];
                if (track.position.z > maxDistance) {
                    scene.remove(track);
                    track.geometry.dispose();
                    trackSegments.splice(i, 1);
                }
            }
        }

        animate();

        // 处理窗口大小变化
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
