<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SKY ROLLER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d95;
            --neon-yellow: #ffed4a;
            --neon-cyan: #00f0ff;
            --neon-purple: #b829dd;
            --bg-dark: #0a0a12;
            --bg-darker: #050508;
            --text-primary: #ffffff;
            --text-secondary: #8a8a9a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 30px;
            left: 30px;
        }

        .score-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--text-primary);
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
            line-height: 1;
        }

        #speed-display {
            position: absolute;
            top: 30px;
            right: 30px;
            text-align: right;
        }

        .speed-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 3px;
        }

        .speed-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(5, 5, 8, 0.95) 0%, rgba(10, 10, 18, 0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            padding: 40px;
        }

        #menu-screen.active, #gameover-screen.active, #start-screen.active {
            display: flex;
        }

        #menu-screen, #gameover-screen, #start-screen {
            display: none;
        }

        .title-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 30px var(--neon-cyan));
            animation: titleFloat 3s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .game-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 300;
            color: var(--text-secondary);
            letter-spacing: 10px;
            margin-top: 15px;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            width: 100%;
            max-height: 45vh;
            overflow-y: auto;
            padding: 20px;
        }

        .song-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-cyan);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .song-item.selected {
            border-color: var(--neon-pink);
            background: rgba(255, 45, 149, 0.1);
        }

        .song-info {
            text-align: left;
        }

        .song-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .song-artist {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .song-meta {
            text-align: right;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .song-bpm {
            color: var(--neon-yellow);
            font-size: 16px;
            font-weight: 700;
        }

        .difficulty-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 100%;
            margin-top: 30px;
        }

        .difficulty-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid;
            border-radius: 15px;
            padding: 20px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .difficulty-btn:hover {
            transform: scale(1.05);
        }

        .difficulty-btn.easy { border-color: #00ff88; }
        .difficulty-btn.normal { border-color: var(--neon-yellow); }
        .difficulty-btn.hard { border-color: var(--neon-pink); }
        .difficulty-btn.insane { border-color: var(--neon-purple); }

        .difficulty-btn.easy:hover, .difficulty-btn.easy.selected { 
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .difficulty-btn.normal:hover, .difficulty-btn.normal.selected { 
            background: rgba(255, 237, 74, 0.2);
            box-shadow: 0 0 30px rgba(255, 237, 74, 0.5);
        }

        .difficulty-btn.hard:hover, .difficulty-btn.hard.selected { 
            background: rgba(255, 45, 149, 0.2);
            box-shadow: 0 0 30px rgba(255, 45, 149, 0.5);
        }

        .difficulty-btn.insane:hover, .difficulty-btn.insane.selected { 
            background: rgba(184, 41, 221, 0.2);
            box-shadow: 0 0 30px rgba(184, 41, 221, 0.5);
        }

        .difficulty-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .difficulty-btn.easy .difficulty-name { color: #00ff88; }
        .difficulty-btn.normal .difficulty-name { color: var(--neon-yellow); }
        .difficulty-btn.hard .difficulty-name { color: var(--neon-pink); }
        .difficulty-btn.insane .difficulty-name { color: var(--neon-purple); }

        .start-btn, .play-btn, .retry-btn, .back-btn {
            padding: 20px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: #fff;
            cursor: pointer;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 30px rgba(0, 240, 255, 0.5),
                0 0 60px rgba(184, 41, 221, 0.3);
            margin-top: 30px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            padding: 15px 40px;
            font-size: 14px;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .start-btn:hover, .play-btn:hover, .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 50px rgba(0, 240, 255, 0.7),
                0 0 100px rgba(184, 41, 221, 0.5);
        }

        .selected-track-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .selected-track-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan);
            margin-bottom: 10px;
        }

        .instructions {
            margin-top: 30px;
            text-align: center;
        }

        .key-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .key-hint {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .instruction-text {
            color: var(--text-secondary);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .final-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 8px;
            margin-bottom: 20px;
        }

        .final-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 72px;
            font-weight: 900;
            color: var(--text-primary);
            text-shadow: 
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
            margin: 20px 0;
        }

        .result-track-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
            margin-bottom: 10px;
        }

        .controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }

        .control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--neon-cyan);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            color: var(--neon-cyan);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            transform: scale(0.9);
            background: rgba(0, 240, 255, 0.3);
        }

        .gameover-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        .gameover-overlay.active {
            display: flex;
        }

        @media (max-width: 600px) {
            .game-title { font-size: 36px; letter-spacing: 4px; }
            .difficulty-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .difficulty-name { font-size: 14px; }
            .control-btn { width: 60px; height: 60px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="score-display">
            <div class="score-label">SCORE</div>
            <div class="score-value" id="score">0</div>
        </div>

        <div id="speed-display">
            <div class="speed-label">SPEED</div>
            <div class="speed-value" id="speed">1.0x</div>
        </div>

        <div class="controls-hint" id="controls-hint">
            <button class="control-btn" id="btn-left">←</button>
            <button class="control-btn" id="btn-right">→</button>
        </div>

        <div id="start-screen" class="screen-overlay active">
            <div class="title-container">
                <div class="game-title">SKY ROLLER</div>
                <div class="game-subtitle">ENDLESS RUNNER</div>
            </div>
            <button class="play-btn" id="play-btn">PLAY</button>
        </div>

        <div id="menu-screen" class="screen-overlay">
            <button class="back-btn" id="back-btn" style="position: absolute; top: 30px; left: 30px;">← BACK</button>
            <div class="title-container">
                <div class="game-title">SELECT TRACK</div>
            </div>
            <div class="song-list" id="song-list"></div>
            <div class="selected-track-info">
                <div class="selected-track-title" id="selected-track-title">-</div>
            </div>
            <div class="difficulty-grid" id="difficulty-grid">
                <button class="difficulty-btn easy" data-difficulty="easy">
                    <div class="difficulty-name">EASY</div>
                </button>
                <button class="difficulty-btn normal selected" data-difficulty="normal">
                    <div class="difficulty-name">NORMAL</div>
                </button>
                <button class="difficulty-btn hard" data-difficulty="hard">
                    <div class="difficulty-name">HARD</div>
                </button>
                <button class="difficulty-btn insane" data-difficulty="insane">
                    <div class="difficulty-name">INSANE</div>
                </button>
            </div>
            <button class="start-btn" id="start-btn">START</button>
        </div>

        <div class="gameover-overlay" id="gameover-overlay">
            <div class="final-title">GAME OVER</div>
            <div class="result-track-name" id="result-track-name">-</div>
            <div class="final-score" id="final-score">0</div>
            <button class="retry-btn" id="retry-btn">RETRY</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        const LANE_COLORS = [0xff2d95, 0xffed4a, 0x00f0ff];
        const LANE_POSITIONS = [-3, 0, 3];
        const LANE_WIDTH = 2.8;

        const TRACKS = [
            { id: 1, name: "Sunrise Valley", artist: "Morning Breeze", speed: 0.3, obstacleRate: 0.4 },
            { id: 2, name: "Neon Highway", artist: "Cyber Pulse", speed: 0.35, obstacleRate: 0.45 },
            { id: 3, name: "Cosmos Drift", artist: "Star Walker", speed: 0.4, obstacleRate: 0.5 },
            { id: 4, name: "Storm Rush", artist: "Thunder Strike", speed: 0.45, obstacleRate: 0.55 },
            { id: 5, name: "Quantum Leap", artist: "Time Traveler", speed: 0.5, obstacleRate: 0.6 }
        ];

        const DIFFICULTY_SETTINGS = {
            easy: { speedMult: 0.7, obstacleMult: 0.6 },
            normal: { speedMult: 1.0, obstacleMult: 1.0 },
            hard: { speedMult: 1.3, obstacleMult: 1.4 },
            insane: { speedMult: 1.6, obstacleMult: 1.8 }
        };

        let scene, camera, renderer;
        let ball, ballTrail;
        let obstacles = [];
        let clouds = [];
        let particles = [];
        let trackSegments = [];
        
        let gameState = 'menu';
        let selectedTrack = null;
        let selectedDifficulty = 'normal';
        let score = 0;
        let distance = 0;
        let currentLane = 1;
        let targetX = 0;
        let speed = 0;
        let gameTime = 0;

        function init() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.insertBefore(renderer.domElement, document.getElementById('ui-layer'));

            const ambientLight = new THREE.AmbientLight(0x6688cc, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffddaa, 1.2);
            sunLight.position.set(10, 20, 10);
            scene.add(sunLight);

            const fillLight = new THREE.PointLight(0xff88aa, 0.5, 50);
            fillLight.position.set(-10, 5, -10);
            scene.add(fillLight);

            createSkyBackground();
            createBall();
            createInitialTrack();

            setupEventListeners();
            animate();

            window.addEventListener('resize', onResize);
        }

        function createSkyBackground() {
            const skyGeo = new THREE.SphereGeometry(500, 32, 32);
            const skyMat = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x0066ff) },
                    bottomColor: { value: new THREE.Color(0xffaa55) },
                    offset: { value: 20 },
                    exponent: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                    }
                `,
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeo, skyMat);
            scene.add(sky);

            for (let i = 0; i < 50; i++) {
                createCloud(
                    (Math.random() - 0.5) * 200,
                    20 + Math.random() * 50,
                    -50 - Math.random() * 200
                );
            }

            for (let i = 0; i < 100; i++) {
                createStar(
                    (Math.random() - 0.5) * 400,
                    Math.random() * 100 + 50,
                    -100 - Math.random() * 300
                );
            }
        }

        function createCloud(x, y, z) {
            const cloudGroup = new THREE.Group();
            const cloudMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });

            for (let j = 0; j < 5; j++) {
                const size = 3 + Math.random() * 4;
                const cloudGeo = new THREE.SphereGeometry(size, 8, 8);
                const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                cloud.position.set(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 5
                );
                cloudGroup.add(cloud);
            }

            cloudGroup.position.set(x, y, z);
            cloudGroup.userData = { type: 'cloud', speed: 0.02 + Math.random() * 0.03 };
            clouds.push(cloudGroup);
            scene.add(cloudGroup);
        }

        function createStar(x, y, z) {
            const starGeo = new THREE.SphereGeometry(0.3, 4, 4);
            const starMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.8
            });
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set(x, y, z);
            star.userData = { type: 'star', twinkle: Math.random() * Math.PI };
            particles.push(star);
            scene.add(star);
        }

        function createBall() {
            const ballGeo = new THREE.SphereGeometry(0.8, 32, 32);
            const ballMat = new THREE.MeshStandardMaterial({
                color: 0xffffff,
                emissive: 0x00aaff,
                emissiveIntensity: 0.3,
                metalness: 0.8,
                roughness: 0.2
            });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(0, 1.5, 5);
            ball.castShadow = true;
            scene.add(ball);

            const glowGeo = new THREE.SphereGeometry(1.0, 16, 16);
            const glowMat = new THREE.MeshBasicMaterial({
                color: 0x00aaff,
                transparent: true,
                opacity: 0.2
            });
            ballTrail = new THREE.Mesh(glowGeo, glowMat);
            ball.add(ballTrail);
        }

        function createInitialTrack() {
            for (let z = 30; z > -50; z -= 10) {
                createTrackSegment(z);
            }
        }

        function createTrackSegment(z) {
            const segmentGroup = new THREE.Group();

            for (let i = 0; i < 3; i++) {
                const laneGeo = new THREE.BoxGeometry(LANE_WIDTH, 0.5, 10);
                const laneMat = new THREE.MeshStandardMaterial({
                    color: LANE_COLORS[i],
                    emissive: LANE_COLORS[i],
                    emissiveIntensity: 0.2,
                    metalness: 0.5,
                    roughness: 0.3,
                    transparent: true,
                    opacity: 0.9
                });
                const lane = new THREE.Mesh(laneGeo, laneMat);
                lane.position.set(LANE_POSITIONS[i], 0, 0);
                segmentGroup.add(lane);

                const lineGeo = new THREE.BoxGeometry(0.1, 0.52, 10);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                const leftLine = new THREE.Mesh(lineGeo, lineMat);
                leftLine.position.set(LANE_POSITIONS[i] - LANE_WIDTH/2, 0, 0);
                segmentGroup.add(leftLine);

                const rightLine = leftLine.clone();
                rightLine.position.x = LANE_POSITIONS[i] + LANE_WIDTH/2;
                segmentGroup.add(rightLine);
            }

            segmentGroup.position.z = z;
            segmentGroup.userData = { type: 'track' };
            trackSegments.push(segmentGroup);
            scene.add(segmentGroup);
        }

        function createObstacle() {
            if (!selectedTrack) return;

            const settings = DIFFICULTY_SETTINGS[selectedDifficulty];
            if (Math.random() > selectedTrack.obstacleRate * settings.obstacleMult * 0.3) return;

            const blockedLanes = [];
            const numBlocked = Math.random() < 0.3 ? 2 : 1;
            
            while (blockedLanes.length < numBlocked) {
                const lane = Math.floor(Math.random() * 3);
                if (!blockedLanes.includes(lane)) {
                    blockedLanes.push(lane);
                }
            }

            blockedLanes.forEach(lane => {
                const obstacleGeo = new THREE.BoxGeometry(LANE_WIDTH * 0.8, 3, 2);
                const obstacleMat = new THREE.MeshStandardMaterial({
                    color: 0xff3333,
                    emissive: 0xff0000,
                    emissiveIntensity: 0.4,
                    metalness: 0.6,
                    roughness: 0.3
                });
                const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
                obstacle.position.set(LANE_POSITIONS[lane], 2, -80);
                obstacle.userData = { type: 'obstacle', lane: lane };
                obstacles.push(obstacle);
                scene.add(obstacle);
            });
        }

        function setupEventListeners() {
            document.getElementById('play-btn').addEventListener('click', () => showScreen('menu'));
            document.getElementById('back-btn').addEventListener('click', () => showScreen('start'));
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('retry-btn').addEventListener('click', () => {
                hideGameOver();
                showScreen('menu');
            });

            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedDifficulty = btn.dataset.difficulty;
                });
            });

            document.getElementById('btn-left').addEventListener('click', () => moveLeft());
            document.getElementById('btn-right').addEventListener('click', () => moveRight());

            document.addEventListener('keydown', (e) => {
                if (gameState !== 'playing') return;
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
                if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
            });

            populateSongList();
        }

        function populateSongList() {
            const songList = document.getElementById('song-list');
            songList.innerHTML = '';

            TRACKS.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = 'song-item' + (index === 0 ? ' selected' : '');
                item.innerHTML = `
                    <div class="song-info">
                        <div class="song-title">${track.name}</div>
                        <div class="song-artist">${track.artist}</div>
                    </div>
                    <div class="song-meta">
                        <div class="song-bpm">${(track.speed * 100).toFixed(0)} km/h</div>
                    </div>
                `;
                item.addEventListener('click', () => selectTrack(track, item));
                songList.appendChild(item);
            });

            selectedTrack = TRACKS[0];
            document.getElementById('selected-track-title').textContent = selectedTrack.name;
        }

        function selectTrack(track, element) {
            document.querySelectorAll('.song-item').forEach(item => item.classList.remove('selected'));
            element.classList.add('selected');
            selectedTrack = track;
            document.getElementById('selected-track-title').textContent = track.name;
        }

        function showScreen(screen) {
            document.getElementById('start-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('controls-hint').style.display = 'none';

            switch(screen) {
                case 'start':
                    document.getElementById('start-screen').classList.add('active');
                    break;
                case 'menu':
                    document.getElementById('menu-screen').classList.add('active');
                    break;
                case 'playing':
                    document.getElementById('controls-hint').style.display = 'flex';
                    break;
            }
        }

        function startGame() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();

            gameState = 'playing';
            score = 0;
            distance = 0;
            currentLane = 1;
            targetX = 0;
            gameTime = 0;

            const settings = DIFFICULTY_SETTINGS[selectedDifficulty];
            speed = selectedTrack.speed * settings.speedMult;

            ball.position.set(0, 1.5, 5);

            obstacles.forEach(o => scene.remove(o));
            obstacles = [];

            showScreen('playing');
            document.getElementById('score').textContent = '0';
            document.getElementById('speed').textContent = (speed * 100).toFixed(1) + 'x';
        }

        function moveLeft() {
            if (currentLane > 0) {
                currentLane--;
                targetX = LANE_POSITIONS[currentLane];
            }
        }

        function moveRight() {
            if (currentLane < 2) {
                currentLane++;
                targetX = LANE_POSITIONS[currentLane];
            }
        }

        function checkCollision() {
            const ballBox = new THREE.Box3().setFromObject(ball);
            ballBox.expandByScalar(-0.2);

            for (const obstacle of obstacles) {
                if (obstacle.position.z > 3 && obstacle.position.z < 7) {
                    const obstacleBox = new THREE.Box3().setFromObject(obstacle);
                    if (ballBox.intersectsBox(obstacleBox)) {
                        gameOver();
                        return true;
                    }
                }
            }
            return false;
        }

        function gameOver() {
            gameState = 'gameover';
            playCrashSound();

            document.getElementById('result-track-name').textContent = selectedTrack.name;
            document.getElementById('final-score').textContent = Math.floor(score);
            document.getElementById('gameover-overlay').classList.add('active');
        }

        function hideGameOver() {
            document.getElementById('gameover-overlay').classList.remove('active');
        }

        function playCrashSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playCollectSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let audioCtx;

        function animate() {
            requestAnimationFrame(animate);

            if (gameState === 'playing') {
                gameTime++;

                ball.position.x += (targetX - ball.position.x) * 0.15;
                ball.position.z += speed;
                ball.rotation.x += speed * 2;
                ball.rotation.z = (targetX - ball.position.x) * 0.3;

                distance += speed;
                score = Math.floor(distance * 10);
                document.getElementById('score').textContent = score;

                if (gameTime % 60 === 0) {
                    speed *= 1.01;
                    document.getElementById('speed').textContent = (speed * 100).toFixed(1) + 'x';
                }

                createObstacle();

                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.z += speed;
                    if (obstacles[i].position.z > 15) {
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                    }
                }

                for (const segment of trackSegments) {
                    segment.position.z += speed;
                }

                while (trackSegments.length > 0 && trackSegments[0].position.z > 20) {
                    scene.remove(trackSegments[0]);
                    trackSegments.shift();
                }

                while (trackSegments.length < 8) {
                    const lastZ = trackSegments.length > 0 ? 
                        trackSegments[trackSegments.length - 1].position.z - 10 : 0;
                    createTrackSegment(lastZ - 10);
                }

                if (checkCollision()) {
                    gameState = 'gameover';
                }
            }

            for (const cloud of clouds) {
                cloud.position.x += cloud.userData.speed;
                if (cloud.position.x > 150) cloud.position.x = -150;
            }

            for (const star of particles) {
                star.userData.twinkle += 0.05;
                star.material.opacity = 0.5 + Math.sin(star.userData.twinkle) * 0.3;
            }

            ballTrail.rotation.y += 0.1;

            camera.position.x = ball.position.x * 0.3;
            camera.lookAt(ball.position.x * 0.5, 2, ball.position.z - 10);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
