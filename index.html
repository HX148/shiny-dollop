<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素风机甲对战</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            border: 4px solid #3a3a5a;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(79, 195, 247, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.5);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 600px;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 8px;
        }

        .menu-overlay.hidden {
            display: none;
        }

        .menu-title {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 4px 4px 0 #3a3a5a, 0 0 20px rgba(79, 195, 247, 0.5);
            letter-spacing: 4px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .menu-btn {
            width: 240px;
            padding: 14px 30px;
            margin: 10px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(180deg, #4a4a6a 0%, #2a2a4a 100%);
            border: 3px solid #6a6a8a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-btn:hover {
            background: linear-gradient(180deg, #5a5a7a 0%, #3a3a5a 100%);
            border-color: #8a8aaa;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
        }

        .menu-btn:active {
            transform: translateY(0);
        }

        .menu-btn.blue {
            border-color: #2d6bb3;
            background: linear-gradient(180deg, #1a4f8a 0%, #0d2d4d 100%);
        }

        .menu-btn.red {
            border-color: #c94444;
            background: linear-gradient(180deg, #8a2d2d 0%, #4d1515 100%);
        }

        .menu-btn.gold {
            border-color: #f5d742;
            background: linear-gradient(180deg, #b89a2f 0%, #8a6f18 100%);
        }

        .menu-btn.small {
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
        }

        .input-group {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            font-size: 14px;
            margin-bottom: 8px;
            color: #8a8aaa;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 220px;
            padding: 10px 14px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            color: #fff;
            background: #1a1a2e;
            border: 2px solid #4a4a6a;
            border-radius: 4px;
            text-align: center;
            outline: none;
        }

        .input-group input:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 10px rgba(79, 195, 247, 0.3);
        }

        .room-info {
            margin: 20px 0;
            padding: 15px 25px;
            background: rgba(79, 195, 247, 0.1);
            border: 2px solid #4fc3f7;
            border-radius: 4px;
            text-align: center;
        }

        .room-info .label {
            font-size: 12px;
            color: #8a8aaa;
            margin-bottom: 8px;
        }

        .room-info .room-id {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
            letter-spacing: 3px;
            word-break: break-all;
        }

        .status-text {
            margin: 15px 0;
            font-size: 16px;
            color: #f5d742;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls-hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #5a5a7a;
            text-align: center;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            color: #8a8aaa;
            background: transparent;
            border: 2px solid #4a4a6a;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .back-btn:hover {
            border-color: #8a8aaa;
            color: #fff;
        }

        #healthBars {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .health-container {
            width: 320px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            border: 2px solid #3a3a5a;
        }

        .health-container.blue {
            border-color: #2d6bb3;
        }

        .health-container.red {
            border-color: #c94444;
        }

        .player-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .player-name.blue { color: #5c9bd4; }
        .player-name.red { color: #e57373; }

        .health-bar-bg {
            width: 100%;
            height: 20px;
            background: #1a1a2e;
            border-radius: 2px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
        }

        .health-bar {
            height: 100%;
            transition: width 0.2s ease;
            border-radius: 2px;
        }

        .health-bar.blue {
            background: linear-gradient(180deg, #4fc3f7 0%, #1a4f8a 50%, #0d2d4d 100%);
        }

        .health-bar.red {
            background: linear-gradient(180deg, #ff8a80 0%, #c94444 50%, #8a2d2d 100%);
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 800px;
            height: 600px;
            background: rgba(15, 15, 26, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            border-radius: 8px;
        }

        .game-over-overlay.hidden {
            display: none;
        }

        .game-over-text {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 4px 4px 0 #3a3a5a, 0 0 30px currentColor;
            animation: gameOverPulse 1s ease-in-out infinite;
        }

        .game-over-text.blue { color: #4fc3f7; }
        .game-over-text.red { color: #ff6b6b; }

        @keyframes gameOverPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        /* Hero Grid */
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .hero-card {
            padding: 12px;
            background: rgba(42, 42, 74, 0.8);
            border: 3px solid #4a4a6a;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .hero-card:hover {
            border-color: #4fc3f7;
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(79, 195, 247, 0.3);
        }

        .hero-card.selected {
            border-color: #f5d742;
            box-shadow: 0 0 20px rgba(245, 215, 66, 0.4);
        }

        .hero-card.banned {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .hero-card.locked {
            opacity: 0.5;
        }

        .hero-card .hero-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 8px;
            border-radius: 4px;
        }

        .hero-card .hero-name {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .hero-card .hero-rarity {
            font-size: 10px;
            opacity: 0.8;
        }

        .rarity-common { color: #aaa; }
        .rarity-rare { color: #4fc3f7; }
        .rarity-epic { color: #a855f7; }
        .rarity-legendary { color: #f5d742; }

        /* Player Info Panel */
        .player-info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #4a4a6a;
            border-radius: 6px;
            font-size: 12px;
            text-align: right;
        }

        .player-info-panel .coins {
            color: #f5d742;
            font-weight: bold;
        }

        /* Settings Panel */
        .settings-container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .settings-tab {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            opacity: 0.7;
            transition: all 0.2s;
        }

        .settings-tab.active {
            border-bottom-color: #4fc3f7;
            opacity: 1;
        }

        .settings-content {
            padding: 20px;
            width: 400px;
        }

        .keybind-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 8px;
            background: rgba(42, 42, 74, 0.5);
            border-radius: 4px;
        }

        .keybind-btn {
            padding: 6px 12px;
            background: #2a2a4a;
            border: 2px solid #4a4a6a;
            border-radius: 4px;
            cursor: pointer;
            min-width: 80px;
            font-family: 'Courier New', monospace;
        }

        .keybind-btn.recording {
            border-color: #f5d742;
            animation: blink 0.5s infinite;
        }

        /* Gacha */
        .gacha-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gacha-pack {
            width: 150px;
            height: 200px;
            margin: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .gacha-pack:hover {
            transform: scale(1.05);
        }

        .gacha-result {
            animation: cardReveal 0.8s ease-out;
        }

        @keyframes cardReveal {
            0% { transform: scale(0) rotateY(180deg); opacity: 0; }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a4a6a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6a6a8a;
        }

        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .section-title {
            font-size: 18px;
            margin: 15px 0;
            color: #4fc3f7;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <!-- Player Info -->
        <div id="playerInfo" class="player-info-panel" style="display: none;">
            <div id="playerNameDisplay">玩家</div>
            <div class="coins" id="coinsDisplay">💰 1000</div>
            <div id="statsDisplay">胜: 0 | 负: 0</div>
        </div>

        <div id="healthBars" class="hidden">
            <div class="health-container blue">
                <div class="player-name blue" id="p1HeroName">玩家1</div>
                <div class="health-bar-bg">
                    <div id="health1" class="health-bar blue" style="width: 100%"></div>
                </div>
            </div>
            <div class="health-container red">
                <div class="player-name red" id="p2HeroName">玩家2</div>
                <div class="health-bar-bg">
                    <div id="health2" class="health-bar red" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="mainMenu" class="menu-overlay">
            <div class="menu-title">⚔ 机甲对决 ⚔</div>
            <button class="menu-btn blue" onclick="startLocalGame()">本地对战</button>
            <button class="menu-btn red" onclick="showNetworkMenu()">网络对战</button>
            <button class="menu-btn" onclick="showGacha()">🎰 抽卡</button>
            <button class="menu-btn" onclick="showSettings()">⚙️ 设置</button>
        </div>

        <!-- Network Menu -->
        <div id="networkMenu" class="menu-overlay hidden">
            <button class="back-btn" onclick="showMainMenu()">← 返回</button>
            <div class="menu-title" style="font-size: 32px;">网络对战</div>
            <button class="menu-btn" onclick="createRoom()">创建房间</button>
            <div class="input-group">
                <label>或输入房间ID加入</label>
                <input type="text" id="roomInput" placeholder="输入房间ID">
            </div>
            <button class="menu-btn" onclick="joinRoom()">加入房间</button>
        </div>

        <!-- Waiting Room -->
        <div id="waitingRoom" class="menu-overlay hidden">
            <button class="back-btn" onclick="leaveRoom()">← 返回</button>
            <div class="menu-title" style="font-size: 28px;">等待连接...</div>
            <div class="room-info">
                <div class="label">房间 ID（发送给对方）</div>
                <div id="roomIdDisplay" class="room-id">---</div>
                <button class="menu-btn small" style="margin-top: 15px;" onclick="copyRoomId()">复制房间ID</button>
            </div>
            <div class="status-text">等待玩家加入...</div>
        </div>

        <!-- Connecting -->
        <div id="connectingScreen" class="menu-overlay hidden">
            <button class="back-btn" onclick="cancelJoin()">← 返回</button>
            <div class="menu-title" style="font-size: 28px;">连接中...</div>
            <div class="status-text">正在连接到房间...</div>
        </div>

        <!-- Ban/Pick Screen -->
        <div id="banPickScreen" class="menu-overlay hidden">
            <div class="menu-title" style="font-size: 28px;" id="banPickTitle">禁用阶段</div>
            <div class="status-text" id="banPickStatus">玩家1 禁用英雄</div>
            <div class="hero-grid" id="heroGrid"></div>
            <div style="margin-top: 20px;" id="banPickButtons" class="btn-group"></div>
        </div>

        <!-- Gacha Screen -->
        <div id="gachaScreen" class="menu-overlay hidden">
            <button class="back-btn" onclick="showMainMenu()">← 返回</button>
            <div class="menu-title" style="font-size: 32px;">🎰 抽卡</div>
            <div class="coins" style="font-size: 24px; margin-bottom: 20px;">💰 <span id="gachaCoins">1000</span></div>
            
            <div style="display: flex; gap: 40px; margin: 20px 0;">
                <div style="text-align: center;">
                    <div class="menu-btn gold" style="width: 180px; height: 200px; display: flex; flex-direction: column; justify-content: center;" onclick="doGacha('normal')">
                        <div style="font-size: 40px;">📦</div>
                        <div style="margin-top: 10px;">普通卡包</div>
                        <div style="font-size: 14px; color: #f5d742;">💰 100</div>
                    </div>
                </div>
                <div style="text-align: center;">
                    <div class="menu-btn red" style="width: 180px; height: 200px; display: flex; flex-direction: column; justify-content: center;" onclick="doGacha('premium')">
                        <div style="font-size: 40px;">✨</div>
                        <div style="margin-top: 10px;">高级卡包</div>
                        <div style="font-size: 14px; color: #ff8a80;">💰 300</div>
                    </div>
                </div>
            </div>

            <div id="gachaResult" style="display: none; text-align: center; margin-top: 20px;">
                <div id="gachaResultHero" class="hero-card gacha-result" style="width: 150px; margin: 0 auto;"></div>
                <button class="menu-btn" style="margin-top: 20px;" onclick="hideGachaResult()">确定</button>
            </div>

            <div style="margin-top: 30px;">
                <div class="section-title">我的英雄</div>
                <div class="hero-grid" id="myHeroesGrid" style="max-height: 150px;"></div>
            </div>
        </div>

        <!-- Settings Screen -->
        <div id="settingsScreen" class="menu-overlay hidden">
            <button class="back-btn" onclick="showMainMenu()">← 返回</button>
            <div class="menu-title" style="font-size: 32px;">⚙️ 设置</div>
            
            <div style="display: flex; border-bottom: 2px solid #4a4a6a; margin-bottom: 20px;">
                <div class="settings-tab active" onclick="switchSettingsTab('profile')">资料</div>
                <div class="settings-tab" onclick="switchSettingsTab('controls')">控制</div>
            </div>

            <div id="settingsProfile" class="settings-content">
                <div class="input-group">
                    <label>玩家昵称</label>
                    <input type="text" id="playerNameInput" placeholder="输入昵称">
                </div>
                <button class="menu-btn" onclick="saveProfile()">保存</button>
                <div style="margin-top: 30px; font-size: 14px; color: #8a8aaa;">
                    <div>每日登录奖励: +100 💰</div>
                    <div>胜利奖励: +50 💰</div>
                </div>
            </div>

            <div id="settingsControls" class="settings-content" style="display: none;">
                <div class="section-title">玩家1 键位</div>
                <div class="keybind-row"><span>跳跃</span><button class="keybind-btn" id="kb-p1-jump" onclick="startKeybind('p1', 'jump')">W</button></div>
                <div class="keybind-row"><span>左移</span><button class="keybind-btn" id="kb-p1-left" onclick="startKeybind('p1', 'left')">A</button></div>
                <div class="keybind-row"><span>右移</span><button class="keybind-btn" id="kb-p1-right" onclick="startKeybind('p1', 'right')">D</button></div>
                <div class="keybind-row"><span>攻击</span><button class="keybind-btn" id="kb-p1-attack" onclick="startKeybind('p1', 'attack')">J</button></div>
                <div class="keybind-row"><span>防御</span><button class="keybind-btn" id="kb-p1-defend" onclick="startKeybind('p1', 'defend')">K</button></div>
                
                <div class="section-title">玩家2 键位</div>
                <div class="keybind-row"><span>跳跃</span><button class="keybind-btn" id="kb-p2-jump" onclick="startKeybind('p2', 'jump')">↑</button></div>
                <div class="keybind-row"><span>左移</span><button class="keybind-btn" id="kb-p2-left" onclick="startKeybind('p2', 'left')">←</button></div>
                <div class="keybind-row"><span>右移</span><button class="keybind-btn" id="kb-p2-right" onclick="startKeybind('p2', 'right')">→</button></div>
                <div class="keybind-row"><span>攻击</span><button class="keybind-btn" id="kb-p2-attack" onclick="startKeybind('p2', 'attack')">.</button></div>
                <div class="keybind-row"><span>防御</span><button class="keybind-btn" id="kb-p2-defend" onclick="startKeybind('p2', 'defend')">/</button></div>
            </div>
        </div>

        <!-- Game Over -->
        <div id="gameOverScreen" class="game-over-overlay hidden">
            <div id="winnerText" class="game-over-text">玩家1 胜利!</div>
            <div style="margin-bottom: 20px; color: #f5d742;" id="rewardText"></div>
            <div class="btn-group">
                <button class="menu-btn blue" onclick="restartGame()">再来一局</button>
                <button class="menu-btn" onclick="returnToMenu()">返回菜单</button>
            </div>
        </div>

        <div class="controls-hint" id="controlsHint">
            P1: W跳跃 A/D移动 J攻击 K防御 | P2: ↑跳跃 ←/→移动 .攻击 /防御
        </div>
    </div>

    <script>
        // ==================== GAME DATA ====================
        const HEROES = {
            blueKnight: {
                id: 'blueKnight',
                name: '蓝骑士',
                rarity: 'common',
                stats: { hp: 100, attack: 15, speed: 5 },
                colors: { primary: '#1a4f8a', secondary: '#5c7c99', highlight: '#f5d742', armor: '#2d6bb3' },
                abilities: ['普通攻击', '护盾防御']
            },
            redWarrior: {
                id: 'redWarrior',
                name: '红战士',
                rarity: 'common',
                stats: { hp: 100, attack: 15, speed: 5 },
                colors: { primary: '#8a2d2d', secondary: '#4a4a4a', highlight: '#4fc3f7', armor: '#c94444' },
                abilities: ['普通攻击', '护盾防御']
            },
            greenNinja: {
                id: 'greenNinja',
                name: '绿忍者',
                rarity: 'rare',
                stats: { hp: 85, attack: 20, speed: 7 },
                colors: { primary: '#1a5f2a', secondary: '#3a8a4a', highlight: '#7aff9a', armor: '#2d7a3d' },
                abilities: ['快速斩击', '闪避']
            },
            purpleMage: {
                id: 'purpleMage',
                name: '紫法师',
                rarity: 'rare',
                stats: { hp: 80, attack: 22, speed: 4 },
                colors: { primary: '#5a1a8a', secondary: '#8a4aaa', highlight: '#d78aff', armor: '#7a2dba' },
                abilities: ['魔法弹', '护盾']
            },
            goldTitan: {
                id: 'goldTitan',
                name: '黄金泰坦',
                rarity: 'epic',
                stats: { hp: 150, attack: 12, speed: 3 },
                colors: { primary: '#8a6f18', secondary: '#c9a932', highlight: '#fff08a', armor: '#b89a2f' },
                abilities: ['重击', '钢铁防御']
            },
            cyberSamurai: {
                id: 'cyberSamurai',
                name: '赛博武士',
                rarity: 'epic',
                stats: { hp: 90, attack: 25, speed: 6 },

        const GACHA_RATES = {

        // ==================== STATE ====================

        // ==================== LOCAL STORAGE ====================
        function loadPlayerData() {

        // ==================== MECH CLASS ====================
        class Mech {
            constructor(x, y, isPlayer1, heroId = 'blueKnight') {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.heroId = heroId;
                const hero = HEROES[heroId];
                this.hp = hero.stats.hp;
                this.maxHp = hero.stats.hp;
                this.attackDamage = hero.stats.attack;
                this.moveSpeed = hero.stats.speed;
                this.direction = isPlayer1 ? 1 : -1;
                this.state = 'idle';
                this.animationFrame = 0;
                this.animationTimer = 0;
                this.isPlayer1 = isPlayer1;
                this.lastAttackTime = 0;
                this.isAttacking = false;
                this.attackHit = false;
                this.isDefending = false;
                this.hitTimer = 0;
                this.invincible = false;
                this.stateTimer = 0;
                this.colors = hero.colors;
                this.heroName = hero.name;
            }

            update(dt, opponent) {
                this.animationTimer += dt;
                if (this.animationTimer > 100) {
                    this.animationTimer = 0;
                    this.animationFrame = (this.animationFrame + 1) % 4;
                }

                if (this.hitTimer > 0) {
                    this.hitTimer -= dt;
                    if (this.hitTimer <= 0) {
                        this.invincible = false;
                    }
                }

                if (this.state === 'hit') {
                    this.stateTimer -= dt;
                    if (this.stateTimer <= 0) {
                        this.state = 'idle';
                    }
                    return;
                }

                if (this.isAttacking) {
                    this.stateTimer -= dt;
                    if (this.stateTimer <= 0) {
                        this.isAttacking = false;
                        this.attackHit = false;
                        this.state = 'idle';
                    }
                }

                this.vy += GRAVITY;
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < PLATFORM_X + 30) {
                    this.x = PLATFORM_X + 30;
                }
                if (this.x > PLATFORM_X + PLATFORM_WIDTH - 30) {
                    this.x = PLATFORM_X + PLATFORM_WIDTH - 30;
                }

                if (this.y >= GROUND_Y) {
                    this.y = GROUND_Y;
                    this.vy = 0;
                    if (this.state === 'jump' || this.state === 'fall') {
                        this.state = 'idle';
                    }
                }

                if (this.state !== 'attack' && this.state !== 'hit') {
                    if (this.vx !== 0) {
                        this.state = 'walk';
                    } else if (this.y < GROUND_Y) {
                        this.state = this.vy < 0 ? 'jump' : 'fall';
                    } else {
                        this.state = 'idle';
                    }
                }

                this.vx = 0;
            }

            jump() {
                if (this.y >= GROUND_Y - 1 && this.state !== 'hit') {
                    this.vy = JUMP_SPEED;
                    this.state = 'jump';
                }
            }

            moveLeft() {
                if (this.state !== 'hit') {
                    this.vx = -this.moveSpeed;
                    this.direction = -1;
                }
            }

            moveRight() {
                if (this.state !== 'hit') {
                    this.vx = this.moveSpeed;
                    this.direction = 1;
                }
            }

            attack(opponent) {
                const now = Date.now();
                if (now - this.lastAttackTime < ATTACK_COOLDOWN) return;
                if (this.state === 'hit') return;

                this.lastAttackTime = now;
                this.isAttacking = true;
                this.attackHit = false;
                this.state = 'attack';
                this.stateTimer = 300;

                const dist = Math.abs(this.x - opponent.x);
                if (dist < ATTACK_RANGE) {
                    const damage = opponent.isDefending ? this.attackDamage * DEFEND_REDUCTION : this.attackDamage;
                    opponent.takeDamage(damage);
                    this.attackHit = true;
                }
            }

            defend(isDefending) {
                this.isDefending = isDefending;
                if (isDefending && this.state !== 'hit' && this.state !== 'attack') {
                    this.state = 'defend';
                } else if (!isDefending && this.state === 'defend') {
                    this.state = 'idle';
                }
            }

            takeDamage(amount) {
                if (this.invincible) return;

                this.hp = Math.max(0, this.hp - amount);
                this.state = 'hit';
                this.stateTimer = 200;
                this.hitTimer = 500;
                this.invincible = true;
                this.vx = -this.direction * 3;

                if (this.hp <= 0) {
                    gameState = 'gameover';
                    const winnerIsPlayer1 = !this.isPlayer1;
                    showGameOver(winnerIsPlayer1);
                    
                    if (winnerIsPlayer1) {
                        playerData.wins++;
                    } else {
                        playerData.losses++;
                    }
                    playerData.coins += 50;
                    savePlayerData();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);

                const bobOffset = this.state === 'idle' ? Math.sin(Date.now() / 200) * 2 : 0;
                ctx.translate(0, bobOffset);

                if (this.hitTimer > 0 && Math.floor(this.hitTimer / 50) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                const facing = this.direction;
                ctx.scale(facing, 1);

                const c = this.colors;
                const legOffset = this.state === 'walk' ? Math.sin(this.animationFrame * Math.PI / 2) * 4 : 0;
                const armOffset = this.state === 'attack' ? 20 : (this.state === 'defend' ? -10 : 0);
                const bodyTilt = this.state === 'defend' ? -0.1 : 0;

                ctx.rotate(bodyTilt);

                this.drawLeg(15, 40, legOffset, c);
                this.drawLeg(-15, 40, -legOffset, c);

                this.drawBody(0, 10, c);

                this.drawArm(-20, 0, armOffset, c);
                this.drawArm(20, 0, this.state === 'attack' ? -15 : 0, c);

                this.drawHead(0, -30, c);

                if (this.state === 'defend') {
                    this.drawShield(25, -10, c);
                }

                if (this.state === 'attack') {
                    this.drawFist(40 + armOffset, 5, c);
                }

                ctx.restore();
            }

            drawLeg(x, y, offset, c) {
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 8, y + offset, 16, 24);
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 6, y + 4 + offset, 12, 16);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 7, y + offset, 14, 8);
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 9, y + 18 + offset, 18, 8);
            }

            drawBody(x, y, c) {
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 20, y, 40, 35);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 18, y + 2, 36, 12);
                ctx.fillRect(x - 16, y + 16, 32, 8);
                ctx.fillStyle = c.highlight;
                ctx.fillRect(x - 14, y + 5, 8, 4);
                ctx.fillStyle = '#ff4444';
                if (this.hp < this.maxHp * 0.3) {
                    if (Math.floor(Date.now() / 200) % 2 === 0) {
                        ctx.fillRect(x - 5, y + 20, 10, 6);
                    }
                }
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 4, y + 22, 8, 4);
            }

            drawArm(x, y, offset, c) {
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 6, y + offset, 12, 30);
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 4, y + 2 + offset, 8, 20);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 5, y + offset, 10, 8);
            }

            drawHead(x, y, c) {
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 16, y, 32, 24);
                ctx.fillStyle = c.primary;
                ctx.fillRect(x - 14, y + 2, 28, 18);
                ctx.fillStyle = c.highlight;
                ctx.fillRect(x - 12, y + 4, 10, 6);
                ctx.fillRect(x + 2, y + 4, 10, 6);
                ctx.fillStyle = '#fff';
                ctx.fillRect(x - 10, y + 6, 6, 3);
                ctx.fillRect(x + 4, y + 6, 6, 3);
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 4, y + 14, 8, 6);
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 2, y + 16, 4, 4);
            }

            drawFist(x, y, c) {
                ctx.fillStyle = c.highlight;
                ctx.fillRect(x - 8, y - 8, 16, 16);
                ctx.fillStyle = c.armor;
                ctx.fillRect(x - 6, y - 6, 12, 12);
                ctx.fillStyle = c.secondary;
                ctx.fillRect(x - 4, y - 4, 8, 8);
            }

            drawShield(x, y, c) {
                ctx.fillStyle = 'rgba(79, 195, 247, 0.4)';
                ctx.beginPath();
                ctx.ellipse(x, y, 15, 25, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#4fc3f7';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.fillStyle = 'rgba(79, 195, 247, 0.6)';
                ctx.beginPath();
                ctx.ellipse(x, y, 10, 18, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            getState() {
                return {
                    x: this.x,
                    y: this.y,
                    vx: this.vx,
                    vy: this.vy,
                    hp: this.hp,
                    direction: this.direction,
                    state: this.state,
                    isDefending: this.isDefending
                };
            }

            setState(state) {
                if (state.x !== undefined) this.x = state.x;
                if (state.y !== undefined) this.y = state.y;
                if (state.vx !== undefined) this.vx = state.vx;
                if (state.vy !== undefined) this.vy = state.vy;
                if (state.hp !== undefined) this.hp = state.hp;
                if (state.direction !== undefined) this.direction = state.direction;
                if (state.isDefending !== undefined) this.isDefending = state.isDefending;
            }
        }

        // ==================== CONSTANTS ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRAVITY = 0.8;
        const JUMP_SPEED = -15;
        const GROUND_Y = 450;
        const PLATFORM_WIDTH = 700;
        const PLATFORM_X = (800 - PLATFORM_WIDTH) / 2;
        const DEFEND_REDUCTION = 0.5;
        const ATTACK_COOLDOWN = 500;
        const ATTACK_RANGE = 80;

        // ==================== GAME FUNCTIONS ====================
        function initGame(hero1 = 'blueKnight', hero2 = 'redWarrior') {
            player1 = new Mech(200, GROUND_Y, true, hero1);
            player2 = new Mech(600, GROUND_Y, false, hero2);
            document.getElementById('p1HeroName').textContent = player1.heroName;
            document.getElementById('p2HeroName').textContent = player2.heroName;
            updateHealthBars();
        }

        function updateHealthBars() {
            document.getElementById('health1').style.width = (player1.hp / player1.maxHp * 100) + '%';
            document.getElementById('health2').style.width = (player2.hp / player2.maxHp * 100) + '%';
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 800, 600);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 600);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % 800;
                const y = (i * 47) % 400;
                ctx.fillRect(x, y, 2, 2);
            }

            ctx.fillStyle = '#2a2a4a';
            ctx.fillRect(PLATFORM_X, GROUND_Y + 64, PLATFORM_WIDTH, 86);

            const platformGradient = ctx.createLinearGradient(0, GROUND_Y, 0, GROUND_Y + 64);
            platformGradient.addColorStop(0, '#6a6a6a');
            platformGradient.addColorStop(0.3, '#5a5a5a');
            platformGradient.addColorStop(1, '#3a3a3a');
            ctx.fillStyle = platformGradient;
            ctx.fillRect(PLATFORM_X, GROUND_Y, PLATFORM_WIDTH, 64);

            ctx.fillStyle = '#7a7a7a';
            for (let i = 0; i < PLATFORM_WIDTH; i += 40) {
                ctx.fillRect(PLATFORM_X + i, GROUND_Y, 20, 4);
            }

            ctx.fillStyle = '#f5d742';
            for (let i = 0; i < PLATFORM_WIDTH; i += 80) {
                ctx.fillRect(PLATFORM_X + i, GROUND_Y, 20, 4);
            }
            ctx.fillStyle = '#333';
            for (let i = 40; i < PLATFORM_WIDTH; i += 80) {
                ctx.fillRect(PLATFORM_X + i, GROUND_Y, 20, 4);
            }

            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(PLATFORM_X, GROUND_Y + 60, PLATFORM_WIDTH, 8);
        }

        function checkKey(key, player, action) {
            const binds = playerData.settings.keybinds[player];
            return keys[binds[action]] || keys[key];
        }

        function handleLocalInput() {
            if (isNetworkGame && localPlayerId === 1) return;

            // Player 1
            if (checkKey('KeyA', 'player1', 'left')) player1.moveLeft();
            if (checkKey('KeyD', 'player1', 'right')) player1.moveRight();
            if (checkKey('KeyW', 'player1', 'jump')) player1.jump();
            if (checkKey('KeyJ', 'player1', 'attack')) player1.attack(player2);
            player1.defend(checkKey('KeyK', 'player1', 'defend'));

            // Player 2 (only local)
            if (!isNetworkGame) {
                if (checkKey('ArrowLeft', 'player2', 'left')) player2.moveLeft();
                if (checkKey('ArrowRight', 'player2', 'right')) player2.moveRight();
                if (checkKey('ArrowUp', 'player2', 'jump')) player2.jump();
                if (checkKey('Period', 'player2', 'attack')) player2.attack(player1);
                player2.defend(checkKey('Slash', 'player2', 'defend'));
            }
        }

        function handleNetworkInput() {
            if (!isNetworkGame) return;

            if (localPlayerId === 1) {
                if (checkKey('KeyA', 'player1', 'left')) player1.moveLeft();
                if (checkKey('KeyD', 'player1', 'right')) player1.moveRight();
                if (checkKey('KeyW', 'player1', 'jump')) player1.jump();
                if (checkKey('KeyJ', 'player1', 'attack')) player1.attack(player2);
                player1.defend(checkKey('KeyK', 'player1', 'defend'));
            } else {
                if (checkKey('ArrowLeft', 'player2', 'left')) player2.moveLeft();
                if (checkKey('ArrowRight', 'player2', 'right')) player2.moveRight();
                if (checkKey('ArrowUp', 'player2', 'jump')) player2.jump();
                if (checkKey('Period', 'player2', 'attack')) player2.attack(player1);
                player2.defend(checkKey('Slash', 'player2', 'defend'));
            }
        }

        function syncGameState() {
            if (!isNetworkGame || !conn || conn.open !== true) return;

            if (localPlayerId === 1) {
                conn.send({
                    type: 'state',
                    player1: player1.getState(),
                    player2: player2.getState()
                });
            } else {
                conn.send({
                    type: 'state',
                    player1: player1.getState(),
                    player2: player2.getState()
                });
            }
        }

        function gameLoop(timestamp) {
            const dt = timestamp - lastTime;
            lastTime = timestamp;

            if (gameState === 'playing') {
                if (isNetworkGame) {
                    handleNetworkInput();
                } else {
                    handleLocalInput();
                }

                player1.update(dt, player2);
                player2.update(dt, player1);

                if (!isNetworkGame) {
                    if (player1.isAttacking && player1.attackHit) {
                        updateHealthBars();
                    }
                    if (player2.isAttacking && player2.attackHit) {
                        updateHealthBars();
                    }
                } else {
                    updateHealthBars();
                    syncGameState();
                }
            }

            drawBackground();

            if (player1 && player2) {
                player1.draw();
                player2.draw();
            }

            requestAnimationFrame(gameLoop);
        }

        // ==================== MENU FUNCTIONS ====================
        function hideAllMenus() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('networkMenu').classList.add('hidden');
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('connectingScreen').classList.add('hidden');
            document.getElementById('banPickScreen').classList.add('hidden');
            document.getElementById('gachaScreen').classList.add('hidden');
            document.getElementById('settingsScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('healthBars').classList.add('hidden');
            document.getElementById('playerInfo').style.display = 'none';
            document.getElementById('controlsHint').style.display = 'block';
        }

        function showMainMenu() {
            gameState = 'menu';
            hideAllMenus();
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('playerInfo').style.display = 'block';
            updatePlayerInfo();

            if (peer) {
                peer.destroy();
                peer = null;
            }
            conn = null;
        }

        function startLocalGame() {
            isNetworkGame = false;
            startBanPick();
        }

        function showNetworkMenu() {
            hideAllMenus();
            document.getElementById('networkMenu').classList.remove('hidden');
        }

        function createRoom() {
            isHost = true;
            isNetworkGame = true;
            localPlayerId = 1;
            remotePlayerId = 2;

            hideAllMenus();
            document.getElementById('waitingRoom').classList.remove('hidden');

            peer = new Peer();

            peer.on('open', (id) => {
                document.getElementById('roomIdDisplay').textContent = id;
            });

            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
            });

            peer.on('error', (err) => {
                alert('连接错误: ' + err.message);
                showNetworkMenu();
            });
        }

        function joinRoom() {
            const roomId = document.getElementById('roomInput').value.trim();
            if (!roomId) {
                alert('请输入房间ID');
                return;
            }

            isHost = false;
            isNetworkGame = true;
            localPlayerId = 2;
            remotePlayerId = 1;

            hideAllMenus();
            document.getElementById('connectingScreen').classList.remove('hidden');

            peer = new Peer();

            peer.on('open', () => {
                conn = peer.connect(roomId, { reliable: true });
                setupConnection();

                conn.on('open', () => {
                    startBanPick();
                });
            });

            peer.on('error', (err) => {
                alert('连接错误: ' + err.message);
                showNetworkMenu();
            });
        }

        function setupConnection() {
            conn.on('data', (data) => {
                if (data.type === 'state') {
                    if (localPlayerId === 1) {
                        player2.setState(data.player2);
                    } else {
                        player1.setState(data.player1);
                    }
                } else if (data.type === 'banPick') {
                    banPickState = data.state;
                    renderBanPickScreen();
                    if (banPickState.phase === 'done' && data.startGame) {
                        startGameFromBanPick();
                    }
                } else if (data.type === 'restart') {
                    restartGame();
                }
            });

            conn.on('close', () => {
                if (gameState === 'playing' || gameState === 'banpick') {
                    alert('连接已断开');
                    showMainMenu();
                }
            });

            if (isHost) {
                startBanPick();
            }
        }

        function leaveRoom() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            conn = null;
            showNetworkMenu();
        }

        function copyRoomId() {
            const roomId = document.getElementById('roomIdDisplay').textContent;
            if (roomId && roomId !== '---') {
                navigator.clipboard.writeText(roomId).then(() => {
                    alert('房间ID已复制到剪贴板！');
                }).catch(() => {
                    prompt('请复制以下房间ID：', roomId);
                });
            }
        }

        function cancelJoin() {
            if (peer) {
                peer.destroy();
                peer = null;
            }
            conn = null;
            showNetworkMenu();
        }

        function showGameOver(player1Won) {
            const winnerText = document.getElementById('winnerText');
            const rewardText = document.getElementById('rewardText');
            if (player1Won) {
                winnerText.textContent = '玩家1 胜利!';
                winnerText.className = 'game-over-text blue';
            } else {
                winnerText.textContent = '玩家2 胜利!';
                winnerText.className = 'game-over-text red';
            }
            rewardText.textContent = '+50 💰';
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            startBanPick();

            if (isNetworkGame && conn && conn.open) {
                conn.send({ type: 'restart' });
            }
        }

        function returnToMenu() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            showMainMenu();

            if (isNetworkGame) {
                if (conn) conn.close();
                if (peer) peer.destroy();
                peer = null;
                conn = null;
            }
        }

        // ==================== BAN/PICK ====================
        function startBanPick() {
            gameState = 'banpick';
            banPickState = {
                phase: 'ban',
                currentTurn: 1,
                bannedHeroes: [],
                pickedHeroes: { player1: null, player2: null }
            };
            
            hideAllMenus();
            document.getElementById('banPickScreen').classList.remove('hidden');
            renderBanPickScreen();
        }

        function renderBanPickScreen() {
            const titleEl = document.getElementById('banPickTitle');
            const statusEl = document.getElementById('banPickStatus');
            const gridEl = document.getElementById('heroGrid');
            const buttonsEl = document.getElementById('banPickButtons');

            if (banPickState.phase === 'ban') {
                titleEl.textContent = '⚔️ 禁用阶段 ⚔️';
                statusEl.textContent = `玩家${banPickState.currentTurn} 禁用英雄`;
            } else if (banPickState.phase === 'pick') {
                titleEl.textContent = '🎮 选择阶段 🎮';
                if (banPickState.pickedHeroes.player1 && banPickState.pickedHeroes.player2) {
                    statusEl.textContent = '双方已选择，准备战斗！';
                } else {
                    statusEl.textContent = `玩家${banPickState.currentTurn} 选择英雄`;
                }
            }

            gridEl.innerHTML = '';
            Object.values(HEROES).forEach(hero => {
                const card = document.createElement('div');
                card.className = 'hero-card';
                card.dataset.heroId = hero.id;
                
                if (banPickState.bannedHeroes.includes(hero.id)) {
                    card.classList.add('banned');
                }
                if (banPickState.pickedHeroes.player1 === hero.id || banPickState.pickedHeroes.player2 === hero.id) {
                    card.classList.add('selected');
                }
                if (!playerData.unlockedHeroes.includes(hero.id) && !isNetworkGame) {
                    card.classList.add('locked');
                }

                const icon = document.createElement('div');
                icon.className = 'hero-icon';
                icon.style.background = hero.colors.primary;
                icon.style.border = `3px solid ${hero.colors.armor}`;
                card.appendChild(icon);

                const name = document.createElement('div');
                name.className = 'hero-name';
                name.textContent = hero.name;
                card.appendChild(name);

                const rarity = document.createElement('div');
                rarity.className = `hero-rarity rarity-${hero.rarity}`;
                rarity.textContent = getRarityText(hero.rarity);
                card.appendChild(rarity);

                card.onclick = () => handleHeroClick(hero.id);
                gridEl.appendChild(card);
            });

            buttonsEl.innerHTML = '';
            if (banPickState.phase === 'pick' && banPickState.pickedHeroes.player1 && banPickState.pickedHeroes.player2) {
                const btn = document.createElement('button');
                btn.className = 'menu-btn blue';
                btn.textContent = '开始战斗!';
                btn.onclick = startGameFromBanPick;
                buttonsEl.appendChild(btn);
            }
        }

        function getRarityText(rarity) {
            const map = { common: '普通', rare: '稀有', epic: '史诗', legendary: '传说' };
            return map[rarity];
        }

        function handleHeroClick(heroId) {
            if (isNetworkGame) {
                const isMyTurn = (banPickState.currentTurn === localPlayerId);
                if (!isMyTurn) return;
            }

            if (banPickState.phase === 'ban') {
                if (banPickState.bannedHeroes.includes(heroId)) return;
                banPickState.bannedHeroes.push(heroId);
                
                if (banPickState.bannedHeroes.length >= 2) {
                    banPickState.phase = 'pick';
                    banPickState.currentTurn = 1;
                } else {
                    banPickState.currentTurn = banPickState.currentTurn === 1 ? 2 : 1;
                }
            } else if (banPickState.phase === 'pick') {
                if (banPickState.bannedHeroes.includes(heroId)) return;
                if (banPickState.pickedHeroes.player1 === heroId || banPickState.pickedHeroes.player2 === heroId) return;
                if (!playerData.unlockedHeroes.includes(heroId) && !isNetworkGame) return;

                if (banPickState.currentTurn === 1 && !banPickState.pickedHeroes.player1) {
                    banPickState.pickedHeroes.player1 = heroId;
                    banPickState.currentTurn = 2;
                } else if (banPickState.currentTurn === 2 && !banPickState.pickedHeroes.player2) {
                    banPickState.pickedHeroes.player2 = heroId;
                    banPickState.currentTurn = 1;
                }
            }

            renderBanPickScreen();

            if (isNetworkGame && conn && conn.open) {
                conn.send({ type: 'banPick', state: banPickState });
            }
        }
