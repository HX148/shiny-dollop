name: live_wallpaper
description: "A live wallpaper app for Android"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  video_player: ^2.8.2
  video_thumbnail: ^0.5.3
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5
  video_compress: ^3.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
