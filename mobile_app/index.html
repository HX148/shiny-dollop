<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="动态壁纸">
    <title>动态壁纸</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100' rx='20'/><polygon fill='white' points='40,30 40,70 75,50'/></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .install-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }

        .install-banner span {
            font-size: 14px;
        }

        .install-btn {
            background: #fff;
            color: #667eea;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 20px 0;
            animation: fadeIn 0.6s ease-out;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f64f59 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #b0b0c0;
        }

        .upload-section {
            margin: 24px 0;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        .upload-box {
            border: 2px dashed #667eea;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(102, 126, 234, 0.1);
        }

        .upload-box:hover, .upload-box:active {
            border-color: #764ba2;
            background: rgba(102, 126, 234, 0.2);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 16px;
            color: #fff;
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 12px;
            color: #b0b0c0;
        }

        .video-preview {
            margin: 24px 0;
            animation: fadeIn 0.6s ease-out 0.3s both;
        }

        .video-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .video-container video {
            width: 100%;
            display: block;
        }

        .controls {
            margin: 24px 0;
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b0b0c0;
        }

        .control-label .value {
            color: #667eea;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .actions {
            margin: 32px 0;
            animation: fadeIn 0.6s ease-out 0.5s both;
        }

        .action-btn {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f64f59 100%);
            color: #fff;
        }

        .action-btn.primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .action-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #videoInput {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: #fff;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1001;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading.show {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tips {
            margin: 32px 0;
            padding: 20px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 16px;
        }

        .tips h3 {
            font-size: 14px;
            color: #667eea;
            margin-bottom: 12px;
        }

        .tips ul {
            list-style: none;
        }

        .tips li {
            font-size: 12px;
            color: #b0b0c0;
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
        }

        .tips li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #667eea;
        }

        .install-guide {
            margin: 20px 0;
            padding: 20px;
            background: rgba(246, 79, 89, 0.1);
            border-radius: 16px;
            border: 1px solid rgba(246, 79, 89, 0.3);
        }

        .install-guide h3 {
            color: #f64f59;
            margin-bottom: 12px;
        }

        .install-guide p {
            font-size: 13px;
            color: #b0b0c0;
            margin-bottom: 8px;
        }

        .step {
            display: flex;
            align-items: center;
            margin: 12px 0;
        }

        .step-num {
            width: 28px;
            height: 28px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 13px;
            color: #fff;
        }
    </style>
</head>
<body>
    <!-- Install Banner -->
    <div class="install-banner" id="installBanner">
        <span>添加到主屏幕</span>
        <button class="install-btn" onclick="installPWA()">安装</button>
    </div>

    <div class="app-container">
        <div class="header">
            <h1>🎬 动态壁纸</h1>
            <p>选择视频，设置个性化动态壁纸</p>
        </div>

        <div class="upload-section">
            <div class="upload-box" onclick="document.getElementById('videoInput').click()">
                <div class="upload-icon">📁</div>
                <div class="upload-text">点击选择视频文件</div>
                <div class="upload-hint">支持 MP4, MOV, AVI, MKV 格式</div>
            </div>
            <input type="file" id="videoInput" accept="video/*" onchange="handleVideoSelect(event)">
        </div>

        <div class="video-preview" id="videoPreview" style="display: none;">
            <div class="video-container">
                <video id="video" loop muted playsinline controls></video>
            </div>
        </div>

        <div class="controls" id="controls" style="display: none;">
            <div class="control-group">
                <div class="control-label">
                    <span>播放速度</span>
                    <span class="value" id="speedValue">1.0x</span>
                </div>
                <input type="range" id="speedSlider" min="50" max="200" value="100" oninput="updateSpeed()">
            </div>
        </div>

        <div class="actions" id="actions" style="display: none;">
            <button class="action-btn primary" onclick="downloadVideo()">
                <span>📥</span>
                <span>保存视频</span>
            </button>
            <button class="action-btn secondary" onclick="resetSelection()">
                <span>🔄</span>
                <span>重选视频</span>
            </button>
        </div>

        <div class="install-guide" id="installGuide" style="display: none;">
            <h3>📱 设置为壁纸步骤</h3>
            <div class="step">
                <span class="step-num">1</span>
                <span class="step-text">点击上方"保存视频"下载视频</span>
            </div>
            <div class="step">
                <span class="step-num">2</span>
                <span class="step-text">打开手机相册找到下载的视频</span>
            </div>
            <div class="step">
                <span class="step-num">3</span>
                <span class="step-text">点击"设为壁纸"或"更多"→"设置为"</span>
            </div>
            <div class="step">
                <span class="step-num">4</span>
                <span class="step-text">选择"动态壁纸"或"主屏幕"</span>
            </div>
        </div>

        <div class="tips">
            <h3>💡 使用提示</h3>
            <ul>
                <li>建议选择 15-30 秒的视频效果最佳</li>
                <li>视频会被保存到相册中</li>
                <li>不同手机设置壁纸方式略有不同</li>
                <li>可在设置中调整播放速度</li>
            </ul>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: #fff;">处理中...</p>
    </div>

    <script>
        let selectedFile = null;

        function handleVideoSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const url = URL.createObjectURL(file);
                document.getElementById('video').src = url;
                document.getElementById('videoPreview').style.display = 'block';
                document.getElementById('controls').style.display = 'block';
                document.getElementById('actions').style.display = 'block';
                document.getElementById('installGuide').style.display = 'block';
                showToast('视频已加载');
            }
        }

        function updateSpeed() {
            const speed = document.getElementById('speedSlider').value / 100;
            document.getElementById('speedValue').textContent = speed.toFixed(1) + 'x';
            document.getElementById('video').playbackRate = speed;
        }

        function downloadVideo() {
            if (!selectedFile) {
                showToast('请先选择视频');
                return;
            }

            showLoading();

            setTimeout(() => {
                hideLoading();

                const url = URL.createObjectURL(selectedFile);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'live_wallpaper_' + Date.now() + '.mp4';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast('视频已保存到相册');
            }, 1500);
        }

        function resetSelection() {
            selectedFile = null;
            document.getElementById('videoInput').value = '';
            document.getElementById('video').src = '';
            document.getElementById('videoPreview').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('actions').style.display = 'none';
            document.getElementById('installGuide').style.display = 'none';
            document.getElementById('speedSlider').value = 100;
            document.getElementById('speedValue').textContent = '1.0x';
            showToast('已重置');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        // PWA Installation
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'flex';
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        showToast('安装成功！');
                    }
                    deferredPrompt = null;
                    document.getElementById('installBanner').style.display = 'none';
                });
            } else {
                showToast('请使用浏览器打开，然后添加到主屏幕');
            }
        }

        // Hide banner if already installed
        window.addEventListener('appinstalled', () => {
            document.getElementById('installBanner').style.display = 'none';
            showToast('应用已安装到主屏幕！');
        });

        // Check if running in standalone mode
        if (window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('installBanner').style.display = 'none';
        }
    </script>
</body>
</html>
